<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Family Schedule - 박서윤 & 박윤성</title>
    
    <!-- 모바일 앱 최적화 (PWA 설정) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="가족스케줄">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
    
    <!-- 외부 라이브러리 로드 (모바일 안정성 확보) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
            user-select: none;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 로딩 화면 스타일 */
        #loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            z-index: 9999;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 모바일 바텀 시트 애니메이션 보강 */
        .sheet-transition {
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; color: #64748b; font-weight: 600;">데이터를 동기화 중...</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [activeChild, setActiveChild] = useState('SeoYoon');
            const [isSheetOpen, setIsSheetOpen] = useState(false);

            useEffect(() => {
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }
            }, []);

            const scheduleData = {
                SeoYoon: {
                    name: "박서윤",
                    color: "blue",
                    theme: { bg: "bg-blue-600", text: "text-blue-600", light: "bg-blue-50", border: "border-blue-200" },
                    weekly: {
                        1: [{ name: "덕스 (영어)", time: "15:30 ~ 18:30" }],
                        2: [{ name: "아담리즈", time: "14:30 ~ 16:30" }, { name: "미술학원", time: "16:30 ~ 18:20" }],
                        3: [{ name: "아이비 영어 도서관", time: "14:30 ~ 16:30" }, { name: "CMS 수업", time: "19:30 ~ 21:00" }],
                        4: [{ name: "몬테소리 (한국사)", time: "15:00 ~ 16:00" }, { name: "플라톤", time: "16:00 ~ 17:50" }, { name: "코딩 수업", time: "21:00 ~ 21:40" }],
                        5: [{ name: "덕스 (영어)", time: "15:30 ~ 18:30" }],
                    },
                    special: (date) => {
                        const day = date.getDay();
                        const dateNum = date.getDate();
                        const weekNum = Math.ceil(dateNum / 7);
                        let extra = [];
                        if (day === 2 && weekNum === 3) extra.push({ name: "🔭 천문대 수업", time: "18:20 ~ 21:30", type: "special" });
                        if (day === 3 && (weekNum === 2 || weekNum === 4)) extra.push({ name: "🎨 미술 학원 (특강)", time: "17:00 ~ 19:00", type: "special" });
                        return extra;
                    }
                },
                YoonSung: {
                    name: "박윤성",
                    color: "green",
                    theme: { bg: "bg-green-600", text: "text-green-700", light: "bg-green-50", border: "border-green-200" },
                    weekly: {
                        1: [{ name: "소한이 한글", time: "14:00 ~ 15:00" }, { name: "아이비 영어 도서관", time: "15:30 ~ 17:00" }, { name: "종이접기", time: "17:20 ~ 18:20" }],
                        2: [{ name: "그림책여행", time: "14:30 ~ 16:00" }, { name: "미술학원", time: "16:50 ~ 18:40" }],
                        3: [{ name: "아이비 영어 도서관", time: "14:30 ~ 16:30" }, { name: "수영", time: "18:00 ~ 19:00" }],
                        4: [{ name: "몬테소리", time: "14:00 ~ 15:00" }, { name: "아담리즈", time: "16:30 ~ 18:10" }],
                        5: [{ name: "소한이 한글", time: "14:00 ~ 15:00" }, { name: "아이비 영어 도서관", time: "15:30 ~ 17:00" }, { name: "종이접기", time: "17:20 ~ 18:20" }],
                    },
                    special: () => []
                }
            };

            const getDaySchedule = (date, childId) => {
                const child = scheduleData[childId];
                const day = date.getDay();
                let daily = child.weekly[day] ? [...child.weekly[day]] : [];
                const extra = child.special(date);
                return [...daily, ...extra].sort((a, b) => a.time.localeCompare(b.time));
            };

            const calendarDays = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));
                return days;
            }, [currentDate]);

            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons();
            }, [activeChild, isSheetOpen, currentDate]);

            const handleDateClick = (date) => {
                setSelectedDate(date);
                setIsSheetOpen(true);
            };

            const currentTheme = scheduleData[activeChild].theme;

            return (
                <div className="flex flex-col min-h-screen bg-slate-50 text-slate-900 pb-10">
                    <header className="sticky top-0 z-30 bg-white/90 backdrop-blur-md border-b border-slate-200 px-4 py-4 pt-12 md:pt-4">
                        <div className="flex items-center justify-between max-w-md mx-auto w-full">
                            <h1 className="text-xl font-extrabold tracking-tighter text-slate-800">Family Log</h1>
                            <div className="flex p-1 bg-slate-100 rounded-full">
                                {Object.entries(scheduleData).map(([id, info]) => (
                                    <button
                                        key={id}
                                        onClick={() => setActiveChild(id)}
                                        className={`px-5 py-1.5 rounded-full text-xs font-bold transition-all ${
                                            activeChild === id ? `${info.theme.bg} text-white shadow-md` : 'text-slate-500'
                                        }`}
                                    >
                                        {info.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 p-4 max-w-md mx-auto w-full">
                        <div className="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden mb-6">
                            <div className="flex items-center justify-between p-6 pb-2">
                                <h2 className="text-lg font-extrabold">{currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월</h2>
                                <div className="flex space-x-1">
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className="p-2 bg-slate-50 rounded-full active:scale-90 transition-transform"><i data-lucide="chevron-left" className="w-5 h-5 text-slate-400"></i></button>
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className="p-2 bg-slate-50 rounded-full active:scale-90 transition-transform"><i data-lucide="chevron-right" className="w-5 h-5 text-slate-400"></i></button>
                                </div>
                            </div>
                            <div className="grid grid-cols-7 gap-px text-center px-4 pt-4">
                                {['일', '월', '화', '수', '목', '금', '토'].map((d, i) => (
                                    <div key={d} className={`text-[10px] font-black pb-2 ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : 'text-slate-400'}`}>{d}</div>
                                ))}
                            </div>
                            <div className="grid grid-cols-7 gap-px bg-slate-100/50">
                                {calendarDays.map((date, idx) => {
                                    if (!date) return <div key={`empty-${idx}`} className="bg-white h-20"></div>;
                                    const isSelected = selectedDate?.toDateString() === date.toDateString();
                                    const isToday = new Date().toDateString() === date.toDateString();
                                    const schedule = getDaySchedule(date, activeChild);
                                    return (
                                        <button key={idx} onClick={() => handleDateClick(date)} className={`bg-white h-20 flex flex-col items-center justify-start pt-3 relative active:bg-slate-50 transition-colors`}>
                                            {isSelected && <div className={`absolute inset-1.5 rounded-2xl border-2 ${currentTheme.border} ${currentTheme.light}`}></div>}
                                            <span className={`text-sm font-bold z-10 ${isToday ? 'bg-slate-900 text-white w-6 h-6 flex items-center justify-center rounded-full text-[11px]' : date.getDay() === 0 ? 'text-red-500' : date.getDay() === 6 ? 'text-blue-500' : ''}`}>{date.getDate()}</span>
                                            <div className="flex flex-wrap justify-center gap-0.5 mt-2 px-1 z-10">
                                                {schedule.slice(0, 3).map((s, i) => <div key={i} className={`w-1.5 h-1.5 rounded-full ${s.type === 'special' ? 'bg-red-500' : currentTheme.bg}`}></div>)}
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                        
                        <div className="px-2 text-slate-400 text-[10px] text-center">
                            브라우저 메뉴에서 <b>'홈 화면에 추가'</b>를 선택하면 앱처럼 쓸 수 있습니다.
                        </div>
                    </main>

                    {/* Bottom Sheet Overlay */}
                    <div className={`fixed inset-0 z-40 bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300 ${isSheetOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => setIsSheetOpen(false)} />
                    
                    {/* Bottom Sheet Content */}
                    <div className={`fixed bottom-0 left-0 right-0 z-50 bg-white rounded-t-[2.5rem] shadow-2xl sheet-transition transform ${isSheetOpen ? 'translate-y-0' : 'translate-y-full'}`}>
                        <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mt-4 mb-2" />
                        <div className="px-8 py-6 flex items-center justify-between border-b border-slate-50">
                            <div>
                                <p className={`text-[10px] font-black uppercase tracking-widest mb-1 ${currentTheme.text}`}>Daily Plan</p>
                                <h3 className="text-2xl font-black">{selectedDate.getMonth() + 1}월 {selectedDate.getDate()}일 일과</h3>
                            </div>
                            <button onClick={() => setIsSheetOpen(false)} className="p-3 bg-slate-100 rounded-full text-slate-500 active:scale-90 transition-transform"><i data-lucide="x"></i></button>
                        </div>
                        <div className="p-8 space-y-4 overflow-y-auto no-scrollbar" style={{ maxHeight: '60vh' }}>
                            {getDaySchedule(selectedDate, activeChild).length > 0 ? (
                                getDaySchedule(selectedDate, activeChild).map((item, i) => (
                                    <div key={i} className={`flex items-stretch p-5 rounded-3xl border ${item.type === 'special' ? 'bg-red-50 border-red-100' : 'bg-white border-slate-100'}`}>
                                        <div className="flex flex-col justify-center border-r border-slate-100 pr-5 min-w-[80px]">
                                            <span className="text-xs font-black text-slate-800 tracking-tighter">{item.time.split('~')[0]}</span>
                                        </div>
                                        <div className="pl-5 flex-1">
                                            <h4 className="text-lg font-extrabold text-slate-800">{item.name}</h4>
                                            <p className="text-xs text-slate-500 mt-1">{item.time}</p>
                                        </div>
                                    </div>
                                ))
                            ) : (
                                <div className="py-20 text-center text-slate-300">
                                    <i data-lucide="calendar-off" className="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                                    <p className="font-bold">일정이 없는 날입니다.</p>
                                </div>
                            )}
                        </div>
                        <div className="h-10 bg-white" />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
