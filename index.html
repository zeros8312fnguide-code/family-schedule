<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Family Schedule App v3.7 (Stable Swipe)</title>
    
    <!-- 모바일 앱 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
    
    <!-- 라이브러리 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* 상하 스크롤 원천 봉쇄 */
            overscroll-behavior: none;
            background-color: #f8fafc;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }

        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .sheet-transition { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        
        .calendar-gesture-area {
            touch-action: none; /* 브라우저 제스처 차단 */
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        input, textarea { user-select: text !important; }
        input[type="time"] { position: relative; width: 100%; height: 100%; background: transparent; cursor: pointer; }
        input[type="time"]::-webkit-calendar-picker-indicator {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%; margin: 0; padding: 0; cursor: pointer; opacity: 0; 
        }

        @keyframes pulse-red {
            0% { border-color: rgba(239, 68, 68, 0.2); }
            50% { border-color: rgba(239, 68, 68, 0.8); }
            100% { border-color: rgba(239, 68, 68, 0.2); }
        }
        .animate-border-red { animation: pulse-red 2s infinite; border-width: 2px; }
        
        .swipe-content {
            will-change: transform;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                'chevron-left': <path d="m15 18-6-6 6-6"/>,
                'chevron-right': <path d="m9 18 6-6-6-6"/>,
                'x': <path d="M18 6 6 18M6 6l12 12"/>,
                'unlock': <React.Fragment><path d="M7 11V7a5 5 0 0 1 9.9-1"/><rect width="18" height="11" x="3" y="11" rx="2"/><circle cx="12" cy="16" r="1"/></React.Fragment>,
                'lock': <React.Fragment><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></React.Fragment>,
                'trash-2': <React.Fragment><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></React.Fragment>,
                'edit-3': <path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>,
                'clock': <React.Fragment><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></React.Fragment>,
                'calendar-off': <React.Fragment><path d="M4.18 4.18 19.82 19.82M8 2v2M12 2v2M16 2v2M3 8h1M7 8h4M15 8h6M17 12l2 2M3 12v8a2 2 0 0 0 2 2h13.17M21 15.35V6a2 2 0 0 0-2-2H9.5"/></React.Fragment>,
                'calendar': <React.Fragment><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/></React.Fragment>,
                'repeat': <React.Fragment><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></React.Fragment>,
                'cycle': <React.Fragment><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></React.Fragment>,
                'gift': <React.Fragment><polyline points="20 12 20 22 4 22 4 12"/><rect width="20" height="5" x="2" y="7" rx="2"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></React.Fragment>,
                'alert-triangle': <React.Fragment><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></React.Fragment>,
                'database': <React.Fragment><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></React.Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyCoL1JMcH9fDjtXUkn-XqQDfucRZM5qrSI",
            authDomain: "family-app-b83b9.firebaseapp.com",
            projectId: "family-app-b83b9",
            storageBucket: "family-app-b83b9.firebasestorage.app",
            messagingSenderId: "278533683062",
            appId: "1:278533683062:web:0337a8cde210b6f28eac57"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : "family-scheduler";
        const EDIT_PIN = "1234";

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeChild, setActiveChild] = useState('SeoYoon');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [isSheetOpen, setIsSheetOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [isPinInputOpen, setIsPinInputOpen] = useState(false);
            const [pinBuffer, setPinBuffer] = useState("");
            const [masterData, setMasterData] = useState(null);
            const [editingItems, setEditingItems] = useState([]);
            const [uiMessage, setUiMessage] = useState(null);
            const [holidays, setHolidays] = useState({});
            const [pendingConflict, setPendingConflict] = useState(null);
            
            const [swipeOffset, setSwipeOffset] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            
            const gestureAreaRef = useRef(null);
            const touchStartPos = useRef({ x: 0, y: 0 });

            const showMessage = (msg) => { setUiMessage(msg); setTimeout(() => setUiMessage(null), 2000); };

            const formatToAmPm = useCallback((timeStr) => {
                if (!timeStr || !timeStr.includes(':')) return "";
                const [hStr, mStr] = timeStr.split(':');
                const h = parseInt(hStr, 10);
                return `${h >= 12 ? '오후' : '오전'} ${h % 12 || 12}:${mStr}`;
            }, []);

            const timeToMinutes = useCallback((t) => {
                if (!t || !t.includes(':')) return 0;
                const [h, m] = t.split(':').map(Number);
                return h * 60 + m;
            }, []);

            const checkOverlap = useCallback((timeA, timeB) => {
                if (!timeA.includes('~') || !timeB.includes('~')) return false;
                const [sA, eA] = timeA.split('~').map(timeToMinutes);
                const [sB, eB] = timeB.split('~').map(timeToMinutes);
                return sA < eB && sB < eA;
            }, [timeToMinutes]);

            const getInitialData = useCallback(() => ({
                SeoYoon: { 
                    weekly: { 
                        "1": [{n:"덕스(영어)", t:"15:30~18:30"}], "2":[{n:"아담리즈", t:"14:30~16:30"}, {n:"미술학원", t:"16:30~18:20"}], 
                        "3":[{n:"아이비 영어", t:"14:30~16:30"}, {n:"CMS 수업", t:"19:30~21:00"}], 
                        "4":[{n:"몬테소리", t:"15:00~16:00"}, {n:"플라톤", t:"16:00~17:50"}, {n:"코딩", t:"21:00~21:40"}], 
                        "5":[{n:"덕스(영어)", t:"15:30~18:30"}] 
                    }, 
                    monthly: { "3-2": [{n:"🔭 천문대 수업", t:"18:20~21:30"}], "2-3": [{n:"🎨 미술학원 특강", t:"17:00~19:00"}], "4-3": [{n:"🎨 미술학원 특강", t:"17:00~19:00"}] },
                    once: {} 
                },
                YoonSung: { 
                    weekly: { 
                        "1": [{n:"소한이 한글", t:"14:00~15:00"}, {n:"아이비 영어", t:"15:30~17:00"}, {n:"종이접기", t:"17:20~18:20"}], 
                        "2": [{n:"그림책여행", t:"14:30~16:00"}, {n:"미술학원", t:"16:50~18:40"}], 
                        "3": [{n:"아이비 영어", t:"14:30~16:30"}, {n:"수영", t:"18:00~19:00"}], 
                        "4": [{n:"몬테소리", t:"14:00~15:00"}, {n:"아담리즈", t:"16:30~18:10"}], 
                        "5": [{n:"소한이 한글", t:"14:00~15:00"}, {n:"아이비 영어", t:"15:30~17:00"}, {n:"종이접기", t:"17:20~18:20"}] 
                    }, 
                    monthly: {}, once: {} 
                }
            }), []);

            const moveMonth = useCallback((offset) => {
                setCurrentDate(prev => new Date(prev.getFullYear(), prev.getMonth() + offset, 1));
            }, []);

            // [핵심: 이벤트 핸들러 최적화]
            useEffect(() => {
                const el = gestureAreaRef.current;
                if (!el) return;

                let startX = 0;
                let startY = 0;
                let isHorizontal = false;
                let isVertical = false;

                const handleStart = (e) => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    isHorizontal = false;
                    isVertical = false;
                    setIsDragging(true);
                };

                const handleMove = (e) => {
                    if (!startX) return;

                    const currentX = e.touches[0].clientX;
                    const currentY = e.touches[0].clientY;
                    const dx = currentX - startX;
                    const dy = currentY - startY;

                    // 방향 결정 임계값 (10px)
                    if (!isHorizontal && !isVertical) {
                        if (Math.abs(dx) > 10) isHorizontal = true;
                        else if (Math.abs(dy) > 10) isVertical = true;
                    }

                    // 수평 스와이프인 경우 브라우저 수직 스크롤/바운스 차단
                    if (isHorizontal) {
                        if (e.cancelable) e.preventDefault();
                        setSwipeOffset(dx);
                    }
                };

                const handleEnd = (e) => {
                    const finalX = e.changedTouches[0].clientX;
                    const dx = finalX - startX;

                    if (isHorizontal && Math.abs(dx) > 60) {
                        moveMonth(dx > 0 ? -1 : 1);
                    }

                    setIsDragging(false);
                    setSwipeOffset(0);
                    startX = 0;
                };

                // passive: false를 주어 preventDefault()가 작동하게 함
                el.addEventListener('touchstart', handleStart, { passive: true });
                el.addEventListener('touchmove', handleMove, { passive: false });
                el.addEventListener('touchend', handleEnd, { passive: true });

                return () => {
                    el.removeEventListener('touchstart', handleStart);
                    el.removeEventListener('touchmove', handleMove);
                    el.removeEventListener('touchend', handleEnd);
                };
            }, [moveMonth]); // dependencies를 최소화하여 불필요한 재등록 방지

            useEffect(() => {
                const fetchHolidays = async () => {
                    try {
                        const years = [new Date().getFullYear(), new Date().getFullYear() + 1];
                        const allHolidays = {};
                        for (const year of years) {
                            const res = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/KR`);
                            if (res.ok) {
                                (await res.json()).forEach(h => { allHolidays[h.date] = h.localName; });
                            }
                        }
                        setHolidays(allHolidays);
                    } catch (err) { console.error("Holiday API Fail"); }
                };
                fetchHolidays();
            }, []);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await auth.signInWithCustomToken(__initial_auth_token);
                        else await auth.signInAnonymously();
                    } catch (err) { await auth.signInAnonymously().catch(console.error); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => { if (u) setUser(u); });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const docRef = db.doc(`artifacts/${appId}/public/data/schedules/v2_1_master`);
                const unsubscribe = docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) setMasterData(docSnap.data());
                    else {
                        const data = getInitialData();
                        docRef.set(data).then(() => setMasterData(data)).catch(console.error);
                    }
                }, () => showMessage("연결 상태 확인 필요"));
                return () => unsubscribe();
            }, [user, getInitialData]);

            const getHolidayName = useCallback((date) => holidays[date.toISOString().split('T')[0]] || null, [holidays]);
            const getWeekOfMonth = useCallback((date) => Math.ceil((date.getDate() + new Date(date.getFullYear(), date.getMonth(), 1).getDay()) / 7), []);

            const getCombinedSchedule = useCallback((date, childId) => {
                if (!masterData || !date) return [];
                const holiday = getHolidayName(date), day = date.getDay(), weekNum = getWeekOfMonth(date), dateStr = date.toISOString().split('T')[0];
                const weekly = holiday ? [] : (masterData[childId]?.weekly?.[String(day)] || []).map(i => ({...i, type: 'weekly'}));
                const monthly = holiday ? [] : (masterData[childId]?.monthly?.[`${weekNum}-${day}`] || []).map(i => ({...i, type: 'monthly'}));
                const once = (masterData[childId]?.once?.[dateStr] || []).map(i => ({...i, type: 'once'}));
                const raw = [...weekly, ...monthly, ...once].sort((a, b) => String(a.t || "").localeCompare(String(b.t || "")));
                const schedule = raw.map((item, idx) => ({ ...item, isConflicted: raw.some((other, oIdx) => idx !== oIdx && checkOverlap(item.t, other.t)) }));
                if (holiday) schedule.unshift({ n: `🚩 ${holiday}`, t: "00:00~23:59", type: 'holiday', s: true });
                return schedule;
            }, [masterData, getWeekOfMonth, getHolidayName, checkOverlap]);

            const calendarDays = useMemo(() => {
                const y = currentDate.getFullYear(), m = currentDate.getMonth();
                const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
                const d = [];
                for (let i = 0; i < first; i++) d.push(null);
                for (let i = 1; i <= last; i++) d.push(new Date(y, m, i));
                return d;
            }, [currentDate]);

            if (!masterData) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white p-10 text-center">
                    <div className="w-12 h-12 border-4 border-slate-100 border-t-blue-500 rounded-full animate-spin mb-6"></div>
                    <h3 className="text-lg font-black text-slate-800 mb-2">데이터 로드 중</h3>
                    <button onClick={() => setMasterData(getInitialData())} className="mt-4 px-6 py-3 bg-slate-900 text-white rounded-2xl text-xs font-black">오프라인 모드 시작</button>
                </div>
            );

            const theme = activeChild === 'SeoYoon' ? 'blue' : 'green';
            const selectedSchedule = getCombinedSchedule(selectedDate, activeChild);

            const verifyPin = () => {
                if (pinBuffer === EDIT_PIN) {
                    setIsPinInputOpen(false);
                    setEditingItems(getCombinedSchedule(selectedDate, activeChild).filter(i => i.type !== 'holiday'));
                    setIsEditMode(true);
                } else { showMessage("PIN 불일치"); setPinBuffer(""); }
            };

            const finalSaveToCloud = async () => {
                setPendingConflict(null);
                const day = selectedDate.getDay(), weekNum = getWeekOfMonth(selectedDate), dateStr = selectedDate.toISOString().split('T')[0];
                const updatedChild = JSON.parse(JSON.stringify(masterData[activeChild]));
                updatedChild.weekly = { ...(updatedChild.weekly || {}), [String(day)]: [] };
                updatedChild.monthly = { ...(updatedChild.monthly || {}), [`${weekNum}-${day}`]: [] };
                updatedChild.once = { ...(updatedChild.once || {}), [dateStr]: [] };
                editingItems.forEach(({ type, n, t }) => {
                    if (type === 'weekly') updatedChild.weekly[String(day)].push({ n, t });
                    else if (type === 'monthly') updatedChild.monthly[`${weekNum}-${day}`].push({ n, t });
                    else updatedChild.once[dateStr].push({ n, t });
                });
                try {
                    await db.doc(`artifacts/${appId}/public/data/schedules/v2_1_master`).set({ ...masterData, [activeChild]: updatedChild });
                    setIsEditMode(false);
                    showMessage("저장 완료!");
                } catch (e) { showMessage("저장 실패"); }
            };

            return (
                <div className="flex flex-col h-full bg-slate-50 text-slate-900 overflow-hidden">
                    {uiMessage && <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] bg-slate-800 text-white px-6 py-3 rounded-full text-xs font-bold shadow-2xl animate-in fade-in slide-in-from-top-4">{uiMessage}</div>}

                    {pendingConflict && (
                        <div className="fixed inset-0 z-[110] bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-sm p-8 shadow-2xl animate-in zoom-in">
                                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="alert-triangle" className="w-8 h-8" /></div>
                                <h4 className="text-xl font-black text-center mb-2">시간 중복 감지</h4>
                                <p className="text-slate-500 text-center text-sm mb-8">시간이 겹칩니다. 계속 진행하시겠습니까?</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setPendingConflict(null)} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">취소</button>
                                    <button onClick={finalSaveToCloud} className="flex-1 py-4 bg-red-500 text-white rounded-2xl font-bold">계속</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 py-4 pt-12 text-center">
                        <div className="flex items-center justify-between max-w-md mx-auto w-full">
                            <h1 className="text-xl font-black tracking-tighter">Family App</h1>
                            <div className="flex p-1 bg-slate-100 rounded-full border border-slate-200">
                                {['SeoYoon', 'YoonSung'].map(id => (
                                    <button key={id} onClick={() => { setActiveChild(id); setIsEditMode(false); setIsPinInputOpen(false); }} 
                                        className={`px-6 py-1.5 rounded-full text-[11px] font-black transition-all ${activeChild === id ? (id === 'SeoYoon' ? 'bg-blue-600' : 'bg-green-700') + ' text-white shadow-md' : 'text-slate-400'}`}>
                                        {id === 'SeoYoon' ? '서윤' : '윤성'}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 p-4 max-w-md mx-auto w-full overflow-hidden">
                        <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden mb-6 calendar-gesture-area" ref={gestureAreaRef}>
                            <div className="flex items-center justify-between p-6 pb-2">
                                <h2 className="text-lg font-extrabold">{currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월</h2>
                                <div className="flex space-x-1">
                                    <button onClick={() => moveMonth(-1)} className="p-2 active:scale-90"><Icon name="chevron-left" className="text-slate-400" /></button>
                                    <button onClick={() => moveMonth(1)} className="p-2 active:scale-90"><Icon name="chevron-right" className="text-slate-400" /></button>
                                </div>
                            </div>
                            <div className="grid grid-cols-7 text-center px-4 pt-4 border-b border-slate-50 pb-2 text-slate-400 font-black">
                                {['일', '월', '화', '수', '목', '금', '토'].map((d, i) => (
                                    <div key={d} className={`text-[10px] ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : ''}`}>{d}</div>
                                ))}
                            </div>
                            <div 
                                className="grid grid-cols-7 gap-px bg-slate-100/30 swipe-content"
                                style={{ 
                                    transform: `translateX(${swipeOffset}px)`,
                                    transition: isDragging ? 'none' : 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)'
                                }}
                            >
                                {calendarDays.map((date, idx) => {
                                    if (!date) return <div key={`empty-${idx}`} className="bg-white h-16 md:h-20"></div>;
                                    const isSelected = selectedDate.toDateString() === date.toDateString();
                                    const isToday = new Date().toDateString() === date.toDateString();
                                    const items = getCombinedSchedule(date, activeChild);
                                    const holidayName = getHolidayName(date);
                                    const dayColor = (date.getDay() === 0 || holidayName) ? 'text-red-500' : date.getDay() === 6 ? 'text-blue-500' : 'text-slate-700';

                                    return (
                                        <button key={date.toISOString()} onClick={() => { setSelectedDate(date); setIsSheetOpen(true); }} className="bg-white h-16 md:h-20 flex flex-col items-center justify-start pt-3 relative active:bg-slate-50 transition-colors">
                                            {isSelected && <div className={`absolute inset-1.5 rounded-2xl border-2 border-${theme}-400 bg-${theme}-50 opacity-50`}></div>}
                                            <span className={`text-sm font-bold z-10 ${new Date().toDateString() === date.toDateString() ? 'bg-slate-900 text-white w-6 h-6 flex items-center justify-center rounded-full text-[10px]' : dayColor}`}>{date.getDate()}</span>
                                            <div className="flex flex-wrap justify-center gap-0.5 mt-2 px-1 z-10">
                                                {items.map((item, i) => (
                                                    <div key={i} className={`w-1 h-1 rounded-full ${item.isConflicted ? 'bg-red-500 scale-125' : item.type === 'holiday' ? 'bg-red-300' : (item.type === 'monthly' || item.type === 'once') ? 'bg-amber-500' : `bg-${theme}-500`}`}></div>
                                                ))}
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                        <p className="text-center text-[10px] text-slate-300 font-bold animate-pulse">← 좌우로 밀어서 월 이동 →</p>
                    </main>

                    {/* Bottom Sheet Backdrop */}
                    <div className={`fixed inset-0 z-40 bg-black/40 backdrop-blur-sm transition-opacity ${isSheetOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => { if (!isEditMode && !isPinInputOpen) setIsSheetOpen(false); }} />
                    <div className={`fixed bottom-0 left-0 right-0 z-50 bg-white rounded-t-[2.5rem] shadow-2xl transition-transform duration-500 ease-out transform ${isSheetOpen ? 'translate-y-0' : 'translate-y-full'}`} style={{maxHeight: '92vh'}}>
                        <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mt-4 mb-2" />
                        <div className="px-8 py-6 flex items-center justify-between border-b border-slate-50">
                            <div className="flex-1 pr-4 overflow-hidden text-slate-800">
                                <p className={`text-[10px] font-black uppercase tracking-widest mb-1 text-${theme}-600`}>Daily Schedule</p>
                                <h3 className="text-xl font-black truncate">{selectedDate.getDate()}일 ({['일','월','화','수','목','금','토'][selectedDate.getDay()]}) {getHolidayName(selectedDate) && <span className="text-red-500 ml-1 text-sm">[{getHolidayName(selectedDate)}]</span>}</h3>
                            </div>
                            <button onClick={() => { if (isEditMode) setIsEditMode(false); else { setPinBuffer(""); setIsPinInputOpen(true); } }} className={`flex items-center space-x-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all active:scale-95 ${isEditMode ? 'bg-slate-100 text-slate-500' : 'bg-blue-50 text-blue-600 shadow-sm'}`}>
                                {isEditMode ? <><Icon name="x" className="w-4 h-4" /> 취소</> : <><Icon name="unlock" className="w-3.5 h-3.5" /> 편집</>}
                            </button>
                        </div>

                        <div className="p-8 space-y-4 overflow-y-auto no-scrollbar" style={{maxHeight: '70vh'}}>
                            {!isPinInputOpen && isEditMode && (
                                <div className="space-y-6 pb-12">
                                    {editingItems.map((item, i) => (
                                        <div key={i} className={`flex flex-col p-6 rounded-[2.5rem] border bg-slate-50 relative animate-in fade-in transition-all ${editingItems.some((other, oIdx) => i !== oIdx && checkOverlap(item.t, other.t)) ? 'animate-border-red border-red-500' : 'border-slate-200'}`}>
                                            <button onClick={() => setEditingItems(editingItems.filter((_, idx) => idx !== i))} className="absolute -top-1 -right-1 p-2 bg-red-500 text-white rounded-full shadow-lg"><Icon name="trash-2" className="w-4 h-4" /></button>
                                            <div className="space-y-4">
                                                <div className="flex bg-white p-1 rounded-2xl border border-slate-100 shadow-sm">
                                                    {['weekly', 'monthly', 'once'].map(type => (
                                                        <button key={type} onClick={() => { const n = [...editingItems]; n[i].type = type; setEditingItems(n); }} className={`flex-1 py-2 text-[9px] font-black rounded-xl transition-all flex items-center justify-center gap-1 ${item.type === type ? (type === 'weekly' ? `bg-${theme}-600` : 'bg-amber-500') + ' text-white shadow-md' : 'text-slate-400'}`}>
                                                            <Icon name={type === 'weekly' ? 'repeat' : type === 'monthly' ? 'cycle' : 'calendar'} className="w-3 h-3" /> {type === 'weekly' ? '매주' : type === 'monthly' ? '매월' : '오늘'}
                                                        </button>
                                                    ))}
                                                </div>
                                                <div className="flex items-center bg-white px-4 py-3 rounded-2xl border border-slate-100 shadow-sm">
                                                    <Icon name="edit-3" className="w-4 h-4 text-slate-300 mr-3" /><input className="flex-1 bg-transparent font-bold outline-none text-sm text-slate-800" value={item.n} onChange={(e) => { const n = [...editingItems]; n[i].n = e.target.value; setEditingItems(n); }} placeholder="일정명" />
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <div className="flex-1 h-12 relative flex items-center bg-white px-4 rounded-2xl border border-slate-100 shadow-sm">
                                                        <Icon name="clock" className="w-4 h-4 text-slate-300 mr-2" /><span className="flex-1 text-xs font-bold text-slate-700">{formatToAmPm(String(item.t || "09:00~10:00").split('~')[0])}</span>
                                                        <input type="time" className="absolute inset-0 opacity-0 cursor-pointer" value={String(item.t || "09:00~10:00").split('~')[0]} onChange={(e) => { const n = [...editingItems]; const end = String(item.t || "09:00~10:00").split('~')[1]; n[i].t = `${e.target.value}~${end}`; setEditingItems(n); }} />
                                                    </div>
                                                    <span className="text-slate-300">~</span>
                                                    <div className="flex-1 h-12 relative flex items-center bg-white px-4 rounded-2xl border border-slate-100 shadow-sm">
                                                        <span className="flex-1 text-xs font-bold text-slate-700">{formatToAmPm(String(item.t || "09:00~10:00").split('~')[1])}</span>
                                                        <input type="time" className="absolute inset-0 opacity-0 cursor-pointer" value={String(item.t || "09:00~10:00").split('~')[1]} onChange={(e) => { const n = [...editingItems]; const start = String(item.t || "09:00~10:00").split('~')[0]; n[i].t = `${start}~${e.target.value}`; setEditingItems(n); }} />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    <button onClick={() => setEditingItems([...editingItems, { n: "", t: "12:00~13:00", type: 'once' }])} className="w-full py-5 border-2 border-dashed border-slate-200 rounded-[2rem] text-slate-400 font-bold active:bg-slate-50 transition-all">+ 일정 추가</button>
                                    <button onClick={() => {
                                        let conflict = false;
                                        for(let i=0; i<editingItems.length; i++) {
                                            for(let j=i+1; j<editingItems.length; j++) {
                                                if(checkOverlap(editingItems[i].t, editingItems[j].t)) { conflict = true; break; }
                                            }
                                        }
                                        if(conflict) setPendingConflict(true); else finalSaveToCloud();
                                    }} className={`w-full py-5 bg-${theme}-600 text-white rounded-[2.5rem] font-black shadow-xl mt-6 active:scale-95 transition-transform`}>저장하기</button>
                                </div>
                            )}

                            {isPinInputOpen && (
                                <div className="py-6 flex flex-col items-center">
                                    <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 w-full max-w-[280px] text-center shadow-inner">
                                        <Icon name="lock" className="w-8 h-8 mx-auto text-slate-300 mb-4" />
                                        <h4 className="font-extrabold text-slate-800 mb-6 text-sm text-center tracking-tighter">Security PIN</h4>
                                        <div className="flex justify-center gap-3 mb-8">
                                            {[...Array(4)].map((_, i) => (
                                                <div key={i} className={`w-3.5 h-3.5 rounded-full border-2 transition-all ${pinBuffer.length > i ? 'bg-blue-500 border-blue-500 scale-110' : 'border-slate-300'}`}></div>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-3 gap-2">
                                            {[1,2,3,4,5,6,7,8,9, 'C', 0, 'OK'].map((num) => (
                                                <button key={num} onClick={() => { if (num === 'C') setPinBuffer(""); else if (num === 'OK') verifyPin(); else if (pinBuffer.length < 4) setPinBuffer(pinBuffer + num); }} className={`h-12 flex items-center justify-center rounded-2xl font-bold active:scale-90 transition-all ${num === 'OK' ? 'bg-blue-600 text-white' : 'bg-white text-slate-700 shadow-sm'}`}>{num}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {!isPinInputOpen && !isEditMode && (
                                selectedSchedule.length > 0 ? (
                                    <div className="space-y-4 pb-12">
                                        {selectedSchedule.map((item, i) => {
                                            const isHoli = item.type === 'holiday', isSpec = item.type === 'monthly' || item.type === 'once';
                                            return (
                                                <div key={i} className={`flex items-stretch p-6 rounded-[2.5rem] border shadow-sm transition-all active:scale-[0.98] ${item.isConflicted ? 'bg-red-50 border-red-200 animate-border-red' : isHoli ? 'bg-red-50 border-red-100' : isSpec ? 'bg-amber-50 border-amber-100' : 'bg-white border-slate-50'}`}>
                                                    <div className={`flex flex-col justify-center border-r pr-6 min-w-[95px] ${item.isConflicted ? 'border-red-200' : isHoli ? 'border-red-200/50' : isSpec ? 'border-amber-200/50' : 'border-slate-100/50'}`}>
                                                        <span className={`text-[11px] font-black tracking-tighter italic ${item.isConflicted || isHoli ? 'text-red-600' : isSpec ? 'text-amber-700' : 'text-slate-800'}`}>{isHoli ? "00:00" : String(item.t || "").split('~')[0]}</span>
                                                        <span className="text-[9px] text-slate-400 font-bold uppercase mt-0.5">{isHoli ? 'OFF' : 'Start'}</span>
                                                    </div>
                                                    <div className="pl-6 flex-1 flex flex-col justify-center overflow-hidden">
                                                        <div className="flex items-center gap-1.5 mb-1">
                                                            {item.isConflicted && <Icon name="alert-triangle" className="text-red-500 w-4 h-4" />}
                                                            {isHoli ? <Icon name="gift" className="text-red-500 w-4 h-4" /> : isSpec && !item.isConflicted && <span className="px-1.5 py-0.5 rounded-md bg-amber-500 text-white text-[8px] font-black uppercase tracking-tighter">{item.type}</span>}
                                                            <h4 className={`text-lg font-black leading-tight truncate ${item.isConflicted || isHoli ? 'text-red-800' : isSpec ? 'text-amber-900' : 'text-slate-800'}`}>{String(item.n || "")}</h4>
                                                        </div>
                                                        <p className={`text-xs font-medium truncate ${item.isConflicted || isHoli ? 'text-red-400' : isSpec ? 'text-amber-600' : 'text-slate-400'}`}>
                                                            {isHoli ? "전체 휴무" : formatToAmPm(String(item.t || "").split('~')[0]) + " ~ " + formatToAmPm(String(item.t || "").split('~')[1])}
                                                        </p>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : <div className="py-24 text-center text-slate-300 font-bold">등록된 일정이 없습니다.</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
