<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Family Schedule App</title>
    
    <!-- 모바일 앱 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
    
    <!-- 라이브러리 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compat 버전) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .sheet-transition { transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); }
        input, textarea { user-select: text !important; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 아이콘 컴포넌트 (React.Fragment를 사용하여 SyntaxError 해결)
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                'chevron-left': <path d="m15 18-6-6 6-6"/>,
                'chevron-right': <path d="m9 18 6-6-6-6"/>,
                'x': <path d="M18 6 6 18M6 6l12 12"/>,
                'unlock': (
                    <React.Fragment>
                        <path d="M7 11V7a5 5 0 0 1 9.9-1"/><rect width="18" height="11" x="3" y="11" rx="2"/><circle cx="12" cy="16" r="1"/>
                    </React.Fragment>
                ),
                'lock': (
                    <React.Fragment>
                        <rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/>
                    </React.Fragment>
                ),
                'trash-2': (
                    <React.Fragment>
                        <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/>
                    </React.Fragment>
                ),
                'edit-3': <path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>,
                'clock': (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                    </React.Fragment>
                ),
                'star': <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
                'calendar-off': (
                    <React.Fragment>
                        <path d="M4.18 4.18 19.82 19.82M8 2v2M12 2v2M16 2v2M3 8h1M7 8h4M15 8h6M17 12l2 2M3 12v8a2 2 0 0 0 2 2h13.17M21 15.35V6a2 2 0 0 0-2-2H9.5"/>
                    </React.Fragment>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // [설정] Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyCoL1JMcH9fDjtXUkn-XqQDfucRZM5qrSI",
            authDomain: "family-app-b83b9.firebaseapp.com",
            projectId: "family-app-b83b9",
            storageBucket: "family-app-b83b9.firebasestorage.app",
            messagingSenderId: "278533683062",
            appId: "1:278533683062:web:0337a8cde210b6f28eac57"
        };

        const appId = "family-scheduler";
        const EDIT_PIN = "1234";

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeChild, setActiveChild] = useState('SeoYoon');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [isSheetOpen, setIsSheetOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [isPinInputOpen, setIsPinInputOpen] = useState(false);
            const [pinBuffer, setPinBuffer] = useState("");
            const [masterData, setMasterData] = useState(null);
            const [editingItems, setEditingItems] = useState([]);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u) setUser(u);
                    else auth.signInAnonymously().catch(console.error);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const docRef = db.doc(`artifacts/${appId}/public/data/schedules/master`);
                const unsubscribe = docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        setMasterData(docSnap.data());
                    } else {
                        const initialData = {
                            SeoYoon: { 
                                "1": [{n:"덕스(영어)", t:"15:30~18:30"}], 
                                "2":[{n:"아담리즈", t:"14:30~16:30"}, {n:"미술학원", t:"16:30~18:20"}], 
                                "3":[{n:"아이비 영어 도서관", t:"14:30~16:30"}, {n:"CMS 수업", t:"19:30~21:00"}], 
                                "4":[{n:"몬테소리 (한국사)", t:"15:00~16:00"}, {n:"플라톤", t:"16:00~17:50"}, {n:"코딩 수업", t:"21:00~21:40"}], 
                                "5":[{n:"덕스(영어)", t:"15:30~18:30"}] 
                            },
                            YoonSung: { 
                                "1": [{n:"소한이 한글", t:"14:00~15:00"}, {n:"아이비 영어 도서관", t:"15:30~17:00"}, {n:"종이접기", t:"17:20~18:20"}], 
                                "2":[{n:"그림책여행", t:"14:30~16:00"}, {n:"미술학원", t:"16:50~18:40"}], 
                                "3":[{n:"아이비 영어 도서관", t:"14:30~16:30"}, {n:"수영", t:"18:00~19:00"}], 
                                "4":[{n:"몬테소리", t:"14:00~15:00"}, {n:"아담리즈", t:"16:30~18:10"}], 
                                "5":[{n:"소한이 한글", t:"14:00~15:00"}, {n:"아이비 영어 도서관", t:"15:30~17:00"}, {n:"종이접기", t:"17:20~18:20"}] 
                            }
                        };
                        docRef.set(initialData);
                        setMasterData(initialData);
                    }
                });
                return () => unsubscribe();
            }, [user]);

            const calendarDays = useMemo(() => {
                const y = currentDate.getFullYear(), m = currentDate.getMonth();
                const first = new Date(y, m, 1).getDay();
                const last = new Date(y, m + 1, 0).getDate();
                const d = [];
                for (let i = 0; i < first; i++) d.push(null);
                for (let i = 1; i <= last; i++) d.push(new Date(y, m, i));
                return d;
            }, [currentDate]);

            const getSpecialEvents = (date, childId) => {
                if (!date || childId !== 'SeoYoon') return [];
                const day = date.getDay();
                const weekNum = Math.ceil(date.getDate() / 7);
                const extras = [];
                if (day === 2 && weekNum === 3) extras.push({ n: "🔭 천문대 수업", t: "18:20~21:30", s: true });
                if (day === 3 && (weekNum === 2 || weekNum === 4)) extras.push({ n: "🎨 미술학원 특강", t: "17:00~19:00", s: true });
                return extras;
            };

            const getCombinedSchedule = (date, childId) => {
                if (!masterData || !date) return [];
                const dayKey = String(date.getDay());
                const regular = masterData[childId]?.[dayKey] || [];
                const special = getSpecialEvents(date, childId);
                return [...regular, ...special].sort((a, b) => String(a.t).localeCompare(String(b.t)));
            };

            const startEditAttempt = () => {
                if (isEditMode) setIsEditMode(false);
                else { setPinBuffer(""); setIsPinInputOpen(true); }
            };

            const verifyPin = () => {
                if (pinBuffer === EDIT_PIN) {
                    setIsPinInputOpen(false);
                    setEditingItems(JSON.parse(JSON.stringify(masterData[activeChild]?.[String(selectedDate.getDay())] || [])));
                    setIsEditMode(true);
                } else {
                    alert("PIN 오류");
                    setPinBuffer("");
                }
            };

            const saveToCloud = async () => {
                const docRef = db.doc(`artifacts/${appId}/public/data/schedules/master`);
                const updated = { ...masterData, [activeChild]: { ...masterData[activeChild], [String(selectedDate.getDay())]: editingItems } };
                await docRef.set(updated);
                setIsEditMode(false);
                alert("저장 완료");
            };

            if (!masterData) return <div className="h-screen flex items-center justify-center text-slate-400 font-bold uppercase text-xs tracking-widest">Syncing...</div>;

            const theme = activeChild === 'SeoYoon' ? 'blue' : 'green';
            const selectedSchedule = getCombinedSchedule(selectedDate, activeChild);

            return (
                <div className="flex flex-col min-h-screen bg-slate-50 text-slate-900 pb-20 overflow-x-hidden">
                    <header className="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 py-4 pt-12 md:pt-4">
                        <div className="flex items-center justify-between max-w-md mx-auto w-full">
                            <h1 className="text-xl font-black text-slate-800 tracking-tighter">Family App</h1>
                            <div className="flex p-1 bg-slate-100 rounded-full">
                                {['SeoYoon', 'YoonSung'].map(id => (
                                    <button key={id} onClick={() => { setActiveChild(id); setIsEditMode(false); setIsPinInputOpen(false); }} 
                                        className={`px-5 py-1.5 rounded-full text-xs font-bold transition-all ${activeChild === id ? (id === 'SeoYoon' ? 'bg-blue-600' : 'bg-green-700') + ' text-white shadow-md' : 'text-slate-500'}`}>
                                        {id === 'SeoYoon' ? '서윤' : '윤성'}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 p-4 max-w-md mx-auto w-full">
                        <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden mb-6">
                            <div className="flex items-center justify-between p-6 pb-2">
                                <h2 className="text-lg font-extrabold">{currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월</h2>
                                <div className="flex space-x-1">
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className="p-2 bg-slate-50 rounded-full"><Icon name="chevron-left" className="w-5 h-5 text-slate-400" /></button>
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className="p-2 bg-slate-50 rounded-full"><Icon name="chevron-right" className="w-5 h-5 text-slate-400" /></button>
                                </div>
                            </div>
                            <div className="grid grid-cols-7 text-center px-4 pt-4 border-b border-slate-50 pb-2">
                                {['일', '월', '화', '수', '목', '금', '토'].map((d, i) => (
                                    <div key={d} className={`text-[10px] font-black ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : 'text-slate-400'}`}>{d}</div>
                                ))}
                            </div>
                            <div className="grid grid-cols-7 gap-px bg-slate-100/30">
                                {calendarDays.map((date, idx) => {
                                    if (!date) return <div key={idx} className="bg-white h-20"></div>;
                                    const isSelected = selectedDate.toDateString() === date.toDateString();
                                    const items = getCombinedSchedule(date, activeChild);
                                    const isToday = new Date().toDateString() === date.toDateString();
                                    return (
                                        <button key={idx} onClick={() => { setSelectedDate(date); setIsSheetOpen(true); }} className="bg-white h-20 flex flex-col items-center justify-start pt-3 relative active:bg-slate-50 transition-colors">
                                            {isSelected && <div className={`absolute inset-1.5 rounded-2xl border-2 border-${theme}-400 bg-${theme}-50 opacity-50`}></div>}
                                            <span className={`text-sm font-bold z-10 ${isToday ? 'bg-slate-900 text-white w-6 h-6 flex items-center justify-center rounded-full text-[10px]' : date.getDay() === 0 ? 'text-red-500' : date.getDay() === 6 ? 'text-blue-500' : 'text-slate-700'}`}>{date.getDate()}</span>
                                            <div className="flex flex-wrap justify-center gap-0.5 mt-2 px-1 z-10">
                                                {items.map((item, i) => <div key={i} className={`w-1 h-1 rounded-full ${item.s ? 'bg-red-500' : `bg-${theme}-500`}`}></div>)}
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </main>

                    <div className={`fixed inset-0 z-40 bg-black/40 backdrop-blur-sm transition-opacity ${isSheetOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => { if (!isEditMode && !isPinInputOpen) setIsSheetOpen(false); }} />
                    <div className={`fixed bottom-0 left-0 right-0 z-50 bg-white rounded-t-[2.5rem] shadow-2xl sheet-transition transform ${isSheetOpen ? 'translate-y-0' : 'translate-y-full'}`}>
                        <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mt-4 mb-2" />
                        <div className="px-8 py-6 flex items-center justify-between border-b border-slate-50">
                            <div>
                                <p className={`text-[10px] font-black uppercase tracking-widest mb-1 text-${theme}-600`}>Daily Schedule</p>
                                <h3 className="text-2xl font-black">{selectedDate.getDate()}일 ({['일','월','화','수','목','금','토'][selectedDate.getDay()]})</h3>
                            </div>
                            <button onClick={startEditAttempt} className={`flex items-center space-x-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all active:scale-95 ${isEditMode ? 'bg-slate-100 text-slate-500' : 'bg-blue-50 text-blue-600 shadow-sm'}`}>
                                {isEditMode ? <><Icon name="x" className="w-4 h-4" /> 취소</> : <><Icon name="unlock" className="w-3.5 h-3.5" /> 편집</>}
                            </button>
                        </div>

                        <div className="p-8 space-y-4 max-h-[65vh] overflow-y-auto no-scrollbar">
                            {isPinInputOpen && (
                                <div className="py-6 flex flex-col items-center">
                                    <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 w-full max-w-[280px] text-center">
                                        <Icon name="lock" className="w-8 h-8 mx-auto text-slate-300 mb-4" />
                                        <h4 className="font-extrabold text-slate-800 mb-6">PIN 번호 입력</h4>
                                        <div className="flex justify-center gap-3 mb-8">
                                            {[...Array(4)].map((_, i) => (
                                                <div key={i} className={`w-3.5 h-3.5 rounded-full border-2 transition-all ${pinBuffer.length > i ? 'bg-blue-500 border-blue-500 scale-110' : 'border-slate-300'}`}></div>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-3 gap-2">
                                            {[1,2,3,4,5,6,7,8,9, 'C', 0, 'OK'].map((num) => (
                                                <button key={num} onClick={() => {
                                                    if (num === 'C') setPinBuffer("");
                                                    else if (num === 'OK') verifyPin();
                                                    else if (pinBuffer.length < 4) setPinBuffer(pinBuffer + num);
                                                }} className={`h-12 flex items-center justify-center rounded-2xl font-bold active:scale-90 transition-all ${num === 'OK' ? 'bg-blue-600 text-white' : 'bg-white text-slate-700 shadow-sm'}`}>
                                                    {num}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {!isPinInputOpen && isEditMode && (
                                <div className="space-y-4 pb-10">
                                    {editingItems.map((item, i) => (
                                        <div key={i} className="flex flex-col p-5 bg-slate-50 rounded-[2rem] border border-slate-200 relative">
                                            <button onClick={() => setEditingItems(editingItems.filter((_, idx) => idx !== i))} className="absolute -top-1 -right-1 p-2 bg-red-500 text-white rounded-full shadow-lg"><Icon name="trash-2" className="w-4 h-4" /></button>
                                            <div className="space-y-3">
                                                <div className="flex items-center bg-white px-4 py-2 rounded-xl border border-slate-100"><Icon name="edit-3" className="w-3.5 h-3.5 text-slate-300 mr-2" /><input className="flex-1 bg-transparent font-bold outline-none text-sm" value={item.n} onChange={(e) => { const n = [...editingItems]; n[i].n = e.target.value; setEditingItems(n); }} placeholder="수업명" /></div>
                                                <div className="flex items-center bg-white px-4 py-2 rounded-xl border border-slate-100"><Icon name="clock" className="w-3.5 h-3.5 text-slate-300 mr-2" /><input className="flex-1 bg-transparent text-xs text-slate-500 outline-none" value={item.t} onChange={(e) => { const n = [...editingItems]; n[i].t = e.target.value; setEditingItems(n); }} placeholder="12:00~13:00" /></div>
                                            </div>
                                        </div>
                                    ))}
                                    <button onClick={() => setEditingItems([...editingItems, { n: "", t: "" }])} className="w-full py-5 border-2 border-dashed border-slate-200 rounded-[2rem] text-slate-400 font-bold active:bg-slate-50">+ 일정 추가</button>
                                    <button onClick={saveToCloud} className={`w-full py-5 bg-${theme}-600 text-white rounded-[2rem] font-black shadow-xl mt-6`}>클라우드 저장</button>
                                </div>
                            )}

                            {!isPinInputOpen && !isEditMode && (
                                selectedSchedule.length > 0 ? (
                                    <div className="space-y-4 pb-10">
                                        {selectedSchedule.map((item, i) => (
                                            <div key={i} className={`flex items-stretch p-6 rounded-[2.5rem] border shadow-sm ${item.s ? 'bg-red-50 border-red-100' : 'bg-white border-slate-50'}`}>
                                                <div className="flex flex-col justify-center border-r border-slate-100/50 pr-6 min-w-[90px]">
                                                    <span className={`text-xs font-black tracking-tighter italic ${item.s ? 'text-red-600' : 'text-slate-800'}`}>{String(item.t || "").split('~')[0]}</span>
                                                    <span className="text-[10px] text-slate-400 font-medium">START</span>
                                                </div>
                                                <div className="pl-6 flex-1 flex flex-col justify-center">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        {item.s && <Icon name="star" className="w-3.5 h-3.5 text-red-500 fill-red-500" />}
                                                        <h4 className={`text-lg font-black leading-tight ${item.s ? 'text-red-800' : 'text-slate-800'}`}>{String(item.n || "")}</h4>
                                                    </div>
                                                    <p className={`text-xs font-medium ${item.s ? 'text-red-400' : 'text-slate-400'}`}>{String(item.t || "")}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : <div className="py-24 text-center text-slate-300 font-bold">
                                    <Icon name="calendar-off" className="w-12 h-12 mx-auto mb-4 opacity-20" />
                                    <p>일정이 없습니다.</p>
                                </div>
                            )}
                        </div>
                        <div className="h-12 bg-white" />
                    </div>
                    <div className="hidden bg-blue-600 bg-green-700 bg-blue-50 bg-green-50 border-blue-400 border-green-400 text-blue-600 text-green-600"></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
